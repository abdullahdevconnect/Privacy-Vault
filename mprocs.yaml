procs:
  next-dev:
    cmd: ["pwsh", "-Command", "npm run dev"]
    cwd: "F:/nodebase_final_pro"
    autostart: true

  inngest-dev:
    cmd: ["pwsh", "-Command", "npx inngest-cli@latest dev"]
